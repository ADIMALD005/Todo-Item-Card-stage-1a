<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testable Todo Card</title>
  <link rel="stylesheet" href="todo-card.css" />
</head>
<body>

  <article
    data-testid="test-todo-card"
    role="region"
    aria-label="Todo task card"
    id="todo-card"
  >

    <!-- Priority indicator (left accent bar) -->
    <div
      data-testid="test-todo-priority-indicator"
      class="priority-indicator"
      aria-hidden="true"
    ></div>

    <!-- Overdue indicator -->
    <div
      data-testid="test-todo-overdue-indicator"
      class="overdue-indicator hidden"
      role="alert"
      aria-live="assertive"
    >Overdue</div>


    <!-- VIEW MODE -->
    <div class="view-mode" id="view-mode">

      <!-- Checkbox + Title + Badges -->
      <div class="card-top">
        <div class="checkbox-wrap">
          <label for="todo-complete" class="sr-only">Mark task as complete</label>
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
        </div>
        <div class="title-group">
          <h2 data-testid="test-todo-title" id="todo-title">
            Redesign onboarding flow for mobile users
          </h2>
          <div class="badges">
            <span
              data-testid="test-todo-priority"
              class="badge priority-high"
              aria-label="Priority: High"
              id="priority-badge"
            >High</span>
            <span
              data-testid="test-todo-status"
              class="badge status-in-progress"
              aria-label="Status: In Progress"
              id="status-badge"
            >In Progress</span>
          </div>
        </div>
      </div>

      <!-- Description + expand/collapse -->
      <div class="description-wrap">
        <p
          data-testid="test-todo-description"
          id="todo-description"
        ></p>
        <div
          data-testid="test-todo-collapsible-section"
          id="todo-collapsible"
          class="collapsible-section"
          aria-hidden="true"
        ></div>
        <button
          data-testid="test-todo-expand-toggle"
          class="expand-toggle hidden"
          aria-expanded="false"
          aria-controls="todo-collapsible"
          id="expand-btn"
        >Show more</button>
      </div>

      <!-- Due date + time remaining -->
      <div class="meta">
        <div class="meta-item">
          <svg class="meta-icon" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <rect x="1" y="2" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="1" y1="5.5" x2="13" y2="5.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="4.5" y1="1" x2="4.5" y2="3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="9.5" y1="1" x2="9.5" y2="3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <time
            data-testid="test-todo-due-date"
            id="due-date-display"
            datetime="2026-05-01T18:00:00Z"
            aria-label="Due date"
          >Due May 1, 2026</time>
        </div>
        <div class="meta-item">
          <svg class="meta-icon" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="7" y1="7" x2="7" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="7" y1="7" x2="9.5" y2="8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining-el"
            aria-live="polite"
            aria-label="Time remaining"
          >Calculating...</time>
        </div>
      </div>

      <div class="divider" role="separator"></div>

      <!-- Status control (NEW Stage 1) -->
      <div class="status-row">
        <label for="status-control" class="control-label">Status</label>
        <select
          data-testid="test-todo-status-control"
          id="status-control"
          aria-label="Change task status"
        >
          <option value="Pending">Pending</option>
          <option value="In Progress" selected>In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <!-- Tags -->
      <ul data-testid="test-todo-tags" role="list" aria-label="Tags" class="tags">
        <li data-testid="test-todo-tag-work"   role="listitem">Work</li>
        <li data-testid="test-todo-tag-urgent" role="listitem">Urgent</li>
        <li data-testid="test-todo-tag-design" role="listitem">Design</li>
      </ul>

      <!-- Edit + Delete -->
      <div class="card-actions">
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          id="edit-btn"
        >Edit</button>
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          id="delete-btn"
        >Delete</button>
      </div>

    </div><!-- /view-mode -->


    <!-- EDIT MODE  (NEW Stage 1) -->
    <div class="edit-mode hidden" id="edit-mode" aria-hidden="true">

      <form
        data-testid="test-todo-edit-form"
        id="edit-form"
        novalidate
        onsubmit="return false;"
      >

        <div class="form-group">
          <label for="edit-title-input">Title</label>
          <input
            type="text"
            id="edit-title-input"
            data-testid="test-todo-edit-title-input"
            placeholder="Task title"
            required
          />
        </div>

        <div class="form-group">
          <label for="edit-description-input">Description</label>
          <textarea
            id="edit-description-input"
            data-testid="test-todo-edit-description-input"
            rows="4"
            placeholder="Task description"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-priority-select">Priority</label>
            <select
              id="edit-priority-select"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High" selected>High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-due-date-input">Due Date</label>
            <input
              type="date"
              id="edit-due-date-input"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>
        </div>

        <div class="form-actions">
          <button
            type="button"
            data-testid="test-todo-cancel-button"
            id="cancel-btn"
            class="btn-secondary"
          >Cancel</button>
          <button
            type="submit"
            data-testid="test-todo-save-button"
            id="save-btn"
            class="btn-primary"
          >Save</button>
        </div>

      </form>
    </div><!-- /edit-mode -->

  </article>

  <script src="todo-card.js"></script>
</body>
</html>
